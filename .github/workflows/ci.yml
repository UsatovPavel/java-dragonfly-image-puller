name: CI

on: [pull_request]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 23
          cache: gradle
      - name: Make gradlew executable
        run: chmod +x gradlew
      - name: Code quality
        run: ./gradlew --no-daemon check -x test

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 23
          cache: gradle
      - name: Make gradlew executable
        run: chmod +x gradlew
      - name: Unit tests
        run: ./gradlew --no-daemon test

  dragonfly-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 23
          cache: gradle
      - name: Make gradlew executable
        run: chmod +x gradlew
      - name: Setup minikube prerequisites
        run: |
          chmod +x scripts/ci-dragonfly-setup.sh
          ./scripts/ci-dragonfly-setup.sh
      - name: Start Dragonfly single-cluster
        run: |
          chmod +x scripts/minikube-dragonfly.sh
          ./scripts/minikube-dragonfly.sh 1
      - name: Dragonfly integration test
        run: |
          DFDAEMON_ADDR=unix:///var/run/dragonfly/dfdaemon.sock \
            ./gradlew --no-daemon test --tests hse.ru.dragonfly.puller.DragonflyImagePullerLocalIntegrationTest
